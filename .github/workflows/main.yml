name: Build on Ubuntu 24.04

permissions: write-all

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debian:
    name: Ubuntu 24.04
    runs-on: ubuntu-24.04
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 4096
        swap-size-mb: 512
        remove-dotnet: 'true'
        remove-android: 'true'
          
    - name: Checkout Source
      uses: actions/checkout@v4
      
    - name: Add repository
      run: |
        sudo add-apt-repository -y ppa:ros-for-jammy/noble
        sudo apt update -y
      
    - name: Install the basic dev packages
      run: sudo apt-get install -y equivs curl git devscripts lintian build-essential automake autotools-dev cmake g++ python3-pip

    - name: Install ROS dev packages
      run: |
        sudo pip3 install -U rosdep rosinstall_generator vcstool
        
    - name: Prepare rosdep
      run: |
        sudo mkdir -p /etc/ros/rosdep/sources.list.d/
        sudo curl -fsSL -o /etc/ros/rosdep/sources.list.d/20-default.list https://gitee.com/qinyinan/rosdistro/raw/master/rosdep/sources.list.d/20-default.list
        cat /etc/ros/rosdep/sources.list.d/20-default.list
        export ROSDISTRO_INDEX_URL=https://gitee.com/qinyinan/rosdistro/raw/master/index-v4.yaml
        echo "ROSDISTRO_INDEX_URL=${ROSDISTRO_INDEX_URL}" >> "$GITHUB_ENV"
        rosdep update
        
    - name: Get ROS Source
      run: |
        for attempt in 1 2 3; do
          rm -rf src
          mkdir -p src
          if vcs import --input noetic-desktop.rosinstall ./src; then
            exit 0
          fi
          sleep $((attempt * 20))
        done
        exit 1

    - name: Install Build Deps
      run: |
        rosdep install --from-paths ./src \
          --ignore-packages-from-source \
          --rosdistro noetic \
          -y \
          --skip-keys='libgazebo11-dev hddtemp gazebo11'

    - name: Build Package
      run: |
        dpkg-buildpackage -b --root-command="sudo" -uc -us  -j4
        
    - name: Prepare Artifacts
      run: |
        mkdir -p artifacts
        mv ../*.deb artifacts

    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ROS1 noetic Auto Build
        path: ${{ github.workspace }}/artifacts/*
        compression-level: 9 # maximum compression
        if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`
