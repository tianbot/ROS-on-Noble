name: Build on Ubuntu 24.04

permissions: write-all

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ROS_SOURCE_MIRROR_BASE: ${{ vars.ROS_SOURCE_MIRROR_BASE }}

jobs:
  debian:
    name: Ubuntu 24.04
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Free runner disk
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
        df -h
      
    - name: Add repository
      run: |
        sudo add-apt-repository -y ppa:tianbot/ros2go
        sudo apt update -y
      
    - name: Install the basic dev packages
      run: sudo apt-get install -y equivs curl git devscripts lintian build-essential automake autotools-dev cmake g++ python3-rosdep vcstool

    - name: Install ROS dev packages
      run: rosdep --version && vcs --version
        
    - name: Prepare rosdep
      run: |
        sudo python3 scripts/install_rosdep_snapshot.py
        cat /etc/ros/rosdep/sources.list.d/20-default.list
        export ROSDISTRO_INDEX_URL="file://${GITHUB_WORKSPACE}/vendor/rosdistro/index-noetic.yaml"
        echo "ROSDISTRO_INDEX_URL=${ROSDISTRO_INDEX_URL}" >> "$GITHUB_ENV"
        rosdep update
        
    - name: Get ROS Source
      run: |
        ROSINSTALL_INPUT=noetic-desktop.rosinstall
        if [ -n "${ROS_SOURCE_MIRROR_BASE:-}" ]; then
          python3 scripts/mirror_rosinstall_sources.py \
            --rewrite-only \
            --base-url "${ROS_SOURCE_MIRROR_BASE}" \
            --output noetic-desktop.mirrored.rosinstall
          ROSINSTALL_INPUT=noetic-desktop.mirrored.rosinstall
        fi
        for attempt in 1 2 3; do
          rm -rf src
          mkdir -p src
          if vcs import --input "${ROSINSTALL_INPUT}" ./src; then
            exit 0
          fi
          sleep $((attempt * 20))
        done
        exit 1

    - name: Install Build Deps
      run: |
        rosdep install --from-paths ./src \
          --ignore-packages-from-source \
          --rosdistro noetic \
          -y \
          --skip-keys='libgazebo11-dev hddtemp gazebo11'

    - name: Install Gazebo build packages
      run: |
        sudo apt-get install -y gazebo libgazebo-dev
        dpkg -L libgazebo-dev | grep -E 'gazebo(Config|-config)?\.cmake|cmake/gazebo' || true

    - name: Build Package
      run: |
        dpkg-buildpackage -b --root-command="sudo" -uc -us  -j4
        
    - name: Prepare Artifacts
      run: |
        mkdir -p artifacts
        mv ../*.deb artifacts

    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ROS1 noetic Auto Build
        path: ${{ github.workspace }}/artifacts/*
        compression-level: 9 # maximum compression
        if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`
